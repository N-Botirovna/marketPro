name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: i18n key drift check
        run: npm run i18n:check

      - name: Lint
        run: npm run lint
        # next.config.js already sets eslint.ignoreDuringBuilds; this catches
        # newly introduced errors before they land on dev/main.
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          # Build needs a non-empty API base URL because getApiBaseUrl() throws
          # in production. CI uses a placeholder — the deployed environment
          # supplies the real one at runtime.
          NEXT_PUBLIC_API_BASE_URL: https://api.example.com/
          NEXT_PUBLIC_SENTRY_DSN: ""

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Gated behind label to keep PR feedback fast; opt-in via `e2e` label.
    if: contains(github.event.pull_request.labels.*.name, 'e2e') || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run e2e
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
