# Host nginx vhost for the frontend — dev.kitobzor.uz
# Place at /etc/nginx/sites-available/dev.kitobzor.uz and symlink into
# sites-enabled, then: nginx -t && systemctl reload nginx
#
# TLS: run `certbot --nginx -d dev.kitobzor.uz` (or point the cert paths
# below at your existing certificates).
#
# The Next.js standalone container listens on 127.0.0.1:3000 (see
# docker-compose.yml). This vhost terminates TLS and reverse-proxies to it.

server {
    listen 80;
    listen [::]:80;
    server_name dev.kitobzor.uz;
    # Certbot serves /.well-known/acme-challenge; redirect everything else.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev.kitobzor.uz;

    ssl_certificate     /etc/letsencrypt/live/dev.kitobzor.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.kitobzor.uz/privkey.pem;

    client_max_body_size 10M;

    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # Immutable Next build assets — cache hard.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
